#
# BZ-633 / BZ-721 / BZ-722 (M5): Bazel-built checkout image — optional registry push, SBOM, vuln scan.
# Runs on published releases and manual dispatch. Does not replace component-build-images.yml
# (Dockerfile matrix); it proves the Bazel OCI path on tags.
name: Bazel checkout OCI (release)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag (workflow_dispatch only)'
        required: false
        default: 'manual'

permissions:
  contents: read
  packages: write

jobs:
  checkout_oci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'

      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazelisk@v3

      - name: Bazel disk cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-release-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-release-${{ runner.os }}-

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "val=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "val=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: OCI base allowlist (BZ-720)
        run: python3 ./tools/bazel/policy/check_oci_allowlist.py

      - name: Build checkout OCI image
        run: bazelisk build //src/checkout:checkout_image --config=ci

      - name: Load image into Docker (SBOM / scan / push)
        run: bazelisk run //src/checkout:checkout_load --config=ci

      - name: Generate SBOM (BZ-721)
        uses: anchore/sbom-action@v0
        with:
          image: otel/demo-checkout:bazel
          artifact-name: sbom-checkout-spdx.json

      - name: Vulnerability scan (BZ-722 — informational)
        uses: anchore/scan-action@v3
        with:
          image: otel/demo-checkout:bazel
          fail-build: false
          severity-cutoff: high

      - name: Log in to container registry (GHCR)
        if: github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push checkout image (optional secret BAZEL_CHECKOUT_PUSH_REPOSITORY)
        if: github.event_name == 'release'
        env:
          REPO: ${{ secrets.BAZEL_CHECKOUT_PUSH_REPOSITORY }}
          TAG: ${{ steps.tag.outputs.val }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${REPO}" ]; then
            echo "Skipping oci_push: set repository secret BAZEL_CHECKOUT_PUSH_REPOSITORY (full path, e.g. ghcr.io/org/demo-checkout-bazel)."
            exit 0
          fi
          bazelisk run --config=ci //src/checkout:checkout_push -- --repository "${REPO}" --tag "${TAG}"
