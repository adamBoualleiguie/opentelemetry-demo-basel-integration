name: Checks

on:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_images:
    permissions:  # required by the reusable workflow
      contents: read
      packages: write
    uses: ./.github/workflows/component-build-images.yml
    with:
      push: ${{ github.event_name == 'push' }}
      # Use a non-release tag for PR builds; tags are not pushed when push=false.
      version: ${{ github.event_name == 'push' && 'main' || 'dev' }}
    secrets: inherit

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: install dependencies
        run: npm install
      - name: run markdownlint
        run: make markdownlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: install yamllint
        run: make install-yamllint
      - name: run yamllint
        run: yamllint . -f github

  misspell:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: run misspell
        run: make misspell

  checklinks:
    name: linkspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run linkspector
        uses: umbrelladocs/action-linkspector@v1
        with:
          level: info
          fail_level: any
          config_file: '.linkspector.yml'

  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: run sanitycheck.py
        run: python3 ./internal/tools/sanitycheck.py

  checklicense:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: run checklicense
        run: make checklicense

  # BZ-610 / M0: Bazel bootstrap smoke (non-blocking while rollout stabilizes).
  bazel_smoke:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: npm install (root dev tools)
        run: npm install
      - name: Install yamllint
        run: make install-yamllint
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazelisk@v3
      - name: Bazel version
        run: bazelisk version
      - name: Bazel M0 smoke + M1 proto + M2 Go + payment + frontend OCI + M3 Python + JVM
        run: |
          bazelisk build //:smoke --config=ci
          bazelisk build //pb:demo_proto //pb:go_grpc_protos //pb:demo_py_grpc //pb:demo_java_grpc --config=ci
          bazelisk build //src/ad:ad //src/fraud-detection:fraud_detection --config=ci
          bazelisk build //src/ad:ad_oci_image //src/fraud-detection:fraud_detection_oci_image --config=ci
          bazelisk build //src/accounting:accounting_publish //src/accounting:accounting_image --config=ci
          bazelisk build //src/checkout/... //src/product-catalog/... //src/payment/... --config=ci
          bazelisk build //src/frontend:frontend_image --config=ci
          bazelisk build //src/recommendation:recommendation //src/product-reviews:product_reviews //src/llm:llm //src/load-generator:load_generator --config=ci
          bazelisk build //src/recommendation:recommendation_image //src/product-reviews:product_reviews_image //src/llm:llm_image //src/load-generator:load_generator_image --config=ci
          bazelisk test //src/checkout/... //src/product-catalog/... //src/frontend:lint --config=ci
      - name: Bazel lint wrappers (Make-backed)
        run: bazelisk run //:lint

  build-test:
    needs: [
      build_images,
      markdownlint,
      yamllint,
      misspell,
      checklinks,
      sanity,
      checklicense,
      bazel_smoke
    ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI status
        shell: bash
        env:
          CI_SUCCESS: ${{ !contains(needs.*.result, 'failure') }}
        run: |
          if [ "${CI_SUCCESS}" == "true" ]
          then
            echo 'Build complete ✓'
          else
            echo 'Build failed ✗'
            exit 1
          fi
