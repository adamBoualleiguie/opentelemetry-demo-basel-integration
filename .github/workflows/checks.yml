name: Checks

on:
  merge_group:
    types: [checks_requested]
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_images:
    permissions:  # required by the reusable workflow
      contents: read
      packages: write
    uses: ./.github/workflows/component-build-images.yml
    with:
      push: ${{ github.event_name == 'push' }}
      # Use a non-release tag for PR builds; tags are not pushed when push=false.
      version: ${{ github.event_name == 'push' && 'main' || 'dev' }}
    secrets: inherit

  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: install dependencies
        run: npm install
      - name: run markdownlint
        run: make markdownlint

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: install yamllint
        run: make install-yamllint
      - name: run yamllint
        run: yamllint . -f github

  misspell:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: run misspell
        run: make misspell

  checklinks:
    name: linkspector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Run linkspector
        uses: umbrelladocs/action-linkspector@v1
        with:
          level: info
          fail_level: any
          config_file: '.linkspector.yml'

  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: run sanitycheck.py
        run: python3 ./internal/tools/sanitycheck.py

  checklicense:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
      - name: run checklicense
        run: make checklicense

  # M4 (BZ-611 / BZ-613): Bazel is the primary build+test gate for the migrated graph.
  bazel_ci:
    runs-on: ubuntu-latest
    steps:
      - name: check out code
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.x'
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Set up Elixir / OTP (flagd-ui Bazel — matches src/flagd-ui/Dockerfile)
        uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.19.3'
          otp-version: '28.0.2'
      - name: Install build deps for flagd-ui mix release + gettext (BZ-097 baked Envoy/nginx)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git gettext-base
      - name: Set up PHP (quote Bazel — matches src/quote/Dockerfile PHP 8.4)
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
      - name: npm install (root dev tools)
        run: npm install
      - name: Install yamllint
        run: make install-yamllint
      - name: Set up Bazelisk
        uses: bazel-contrib/setup-bazelisk@v3
      - name: Bazel disk cache (BZ-613)
        uses: actions/cache@v4
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('.bazelversion', 'MODULE.bazel.lock') }}
          restore-keys: |
            bazel-${{ runner.os }}-
      - name: Bazel version
        run: bazelisk version
      - name: Affected targets hint (BZ-612)
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: bash ./tools/bazel/ci/affected_targets.sh "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}"
      - name: Bazel CI full script (BZ-611 / M4)
        run: bash ./tools/bazel/ci/ci_full.sh

  build-test:
    needs: [
      build_images,
      markdownlint,
      yamllint,
      misspell,
      checklinks,
      sanity,
      checklicense,
      bazel_ci
    ]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Report CI status
        shell: bash
        env:
          CI_SUCCESS: ${{ !contains(needs.*.result, 'failure') }}
        run: |
          if [ "${CI_SUCCESS}" == "true" ]
          then
            echo 'Build complete ✓'
          else
            echo 'Build failed ✗'
            exit 1
          fi
